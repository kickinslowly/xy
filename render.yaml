databases:
  - name: appdb

services:
  - type: web
    name: coordinateplane
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Socket.IO requires an async worker; eventlet is simplest
    startCommand: gunicorn -k eventlet -w 1 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: appdb
          property: connectionString
      - key: FLASK_APP
        value: app.py
    postDeployCommand: flask db upgrade
